name: Deploy to ECS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm:
        description: 'Type the environment name to confirm deployment'
        required: true
        type: string

concurrency:
  group: ecs-deploy-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.TF_VAR_AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  URL: ${{ vars.URL }}
  TF_VAR_aws_region: ${{ vars.TF_VAR_AWS_REGION }}
  TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT }}
  TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
  TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
  TF_VAR_common_tags: ${{ vars.TF_VAR_COMMON_TAGS }}
  TF_VAR_vpc_config: ${{ vars.TF_VAR_VPC_CONFIG }}
  TF_VAR_public_subnet_config: ${{ vars.TF_VAR_PUBLIC_SUBNET_CONFIG }}
  TF_VAR_private_subnet_config: ${{ vars.TF_VAR_PRIVATE_SUBNET_CONFIG }}
  TF_VAR_task_cpu: ${{ vars.TF_VAR_TASK_CPU }}
  TF_VAR_task_memory: ${{ vars.TF_VAR_TASK_MEMORY }}
  TF_VAR_app_port: ${{ vars.TF_VAR_APP_PORT }}
  TF_VAR_app_count: ${{ vars.TF_VAR_APP_COUNT }}

jobs:

  terraform-static-analysis:
    name: Terraform Static Analysis
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate
        working-directory: terraform/environments/${{ inputs.environment }}
        run: |
          terraform init -backend=false
          terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        working-directory: terraform/environments/${{ inputs.environment }}
        run: tflint --init

      - name: TFLint
        working-directory: terraform/environments/${{ inputs.environment }}
        run: tflint

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform


  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    needs:
      - terraform-static-analysis

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image URI
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "uri=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Verify image exists in ECR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=$IMAGE_TAG \
            --region ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init
        working-directory: terraform/environments/${{ inputs.environment }}
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/environments/${{ inputs.environment }}
        run: |
          terraform plan \
            -var="app_image=${{ steps.image.outputs.uri }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/${{ inputs.environment }}
        run: terraform apply -auto-approve tfplan

      - name: Health check
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://${{ env.URL }}/health
          follow-redirect: true
          max-attempts: 20
          retry-delay: 15s