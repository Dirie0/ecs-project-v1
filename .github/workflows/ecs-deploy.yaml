name: Deploy to ECS

on:
  workflow_run:
    workflows: ["Build and Push Gatus Image"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod


concurrency:
  group: ecs-deploy-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: true


permissions:
  id-token: write
  contents: read


jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment || 'dev' }}

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image URI
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "uri=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Verify image exists in ECR
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          aws ecr describe-images \
          --repository-name ${{ env.ECR_REPOSITORY }} \
          --image-ids imageTag=$IMAGE_TAG \
          --region ${{ env.AWS_REGION }}

