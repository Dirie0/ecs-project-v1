name: Teardown ECS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to tear down"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm:
        description: 'Type the environment name to confirm destruction'
        required: true
        type: string

concurrency:
  group: ecs-teardown-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.TF_VAR_AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  URL: ${{ vars.URL }}
  TF_VAR_aws_region: ${{ vars.TF_VAR_AWS_REGION }}
  TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT }}
  TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
  TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
  TF_VAR_common_tags: ${{ vars.TF_VAR_COMMON_TAGS }}
  TF_VAR_vpc_config: ${{ vars.TF_VAR_VPC_CONFIG }}
  TF_VAR_public_subnet_config: ${{ vars.TF_VAR_PUBLIC_SUBNET_CONFIG }}
  TF_VAR_private_subnet_config: ${{ vars.TF_VAR_PRIVATE_SUBNET_CONFIG }}
  TF_VAR_task_cpu: ${{ vars.TF_VAR_TASK_CPU }}
  TF_VAR_task_memory: ${{ vars.TF_VAR_TASK_MEMORY }}
  TF_VAR_app_port: ${{ vars.TF_VAR_APP_PORT }}
  TF_VAR_app_count: ${{ vars.TF_VAR_APP_COUNT }}

jobs:
  teardown:
    name: Teardown ECS
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
            echo "Confirmation input does not match environment. Aborting."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init
        working-directory: terraform/environments/${{ inputs.environment }}
        run: terraform init

      #
      - name: Terraform Destroy
        working-directory: terraform/environments/${{ inputs.environment }}
        run: terraform destroy -auto-approve
   
 
      
  